<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wiom System Simulation v0.1</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f8f9fa;color:#1a1a2e;overflow:hidden;height:100vh}
#app{display:flex;flex-direction:column;height:100vh}

/* NAV */
nav{display:flex;gap:2px;padding:8px 12px;background:#fff;border-bottom:2px solid #d92b90;align-items:center;box-shadow:0 1px 3px rgba(0,0,0,.08)}
nav .brand{font-weight:700;font-size:15px;color:#d92b90;margin-right:16px;white-space:nowrap}
nav button{padding:6px 14px;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;background:#f1f5f9;color:#6b7280;transition:all .15s}
nav button:hover{background:#e2e8f0;color:#1a1a2e}
nav button.active{background:#d92b90;color:#fff}

/* CONTROLS */
#controls{display:flex;align-items:center;gap:12px;padding:8px 12px;background:#fff;border-bottom:1px solid #e2e8f0;font-size:13px}
#controls .day{font-weight:700;font-size:15px;color:#d92b90;min-width:100px}
#controls button{padding:4px 12px;border:1px solid #d1d5db;border-radius:4px;background:#fff;color:#1a1a2e;cursor:pointer;font-size:12px}
#controls button:hover{background:#f1f5f9}
#controls button.active-speed{background:#d92b90;color:#fff;border-color:#d92b90}
#controls .sep{width:1px;height:20px;background:#d1d5db}
#controls .eval-info{color:#6b7280;font-size:11px}

/* VIEWS */
#views{flex:1;overflow:hidden;position:relative}
.view{display:none;height:100%;overflow:auto}
.view.active{display:flex}

/* SYSTEM VIEW */
#system-view.active{display:flex;gap:0}
#sv-left{flex:1;display:flex;flex-direction:column;overflow:hidden;border-right:1px solid #e2e8f0}
#sv-right{width:340px;display:flex;flex-direction:column;min-width:280px;background:#fff;transition:width .3s}
#sv-right.collapsed{width:40px;min-width:40px;overflow:hidden}
#sv-right.collapsed #event-log-header .filters,#sv-right.collapsed #event-log{display:none}
#sv-right.collapsed #event-log-header{writing-mode:vertical-rl;text-orientation:mixed;cursor:pointer;padding:12px 8px}
#ev-collapse-btn{padding:2px 6px;border:1px solid #d1d5db;border-radius:3px;background:transparent;color:#6b7280;cursor:pointer;font-size:10px;margin-left:4px}
#ev-collapse-btn:hover{background:#f1f5f9}

/* Zone Map */
#zone-map{flex:1;overflow-y:auto;padding:10px;background:#f8f9fa}
.zone-card{background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:10px;margin-bottom:8px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.zone-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-size:12px}
.zone-name{font-weight:700;color:#1a1a2e}.zone-class{color:#6b7280;font-size:10px;padding:2px 6px;background:#f1f5f9;border-radius:3px}
.zone-stats{display:flex;gap:8px;font-size:10px;color:#6b7280;margin-bottom:6px}
.zone-dots{display:flex;flex-wrap:wrap;gap:4px}
.csp-dot{width:24px;height:24px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff;transition:all .2s;position:relative;border:2px solid transparent}
.csp-dot:hover{transform:scale(1.3);z-index:10}
.csp-dot.q-compliant{background:#059669}
.csp-dot.q-at-risk{background:#d97706}
.csp-dot.q-non-compliant{background:#dc2626}
.csp-dot.q-recovery{background:#7c3aed}
.csp-dot.q-pending{background:#475569}
.csp-dot.e-restricted{border-color:#f59e0b !important;border-width:3px}
.csp-dot.e-suspended{border-color:#ef4444 !important;border-width:3px}
.csp-dot.e-pre-exit{border-color:#f97316 !important;border-width:3px;animation:pulse 1s infinite}
.csp-dot.e-terminated{background:#1f2937;border-color:#6b7280 !important;border-width:3px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* Tooltip */
.tooltip{display:none;position:fixed;background:#1a1a2e;color:#fff;border:1px solid #334155;border-radius:6px;padding:8px 10px;font-size:11px;z-index:1000;pointer-events:none;max-width:280px;line-height:1.4}
.tooltip.show{display:block}

/* System Counters */
#sys-counters{padding:10px;background:#fff;border-top:1px solid #e2e8f0;display:flex;flex-wrap:wrap;gap:6px}
.counter-box{background:#f8f9fa;border:1px solid #e2e8f0;border-radius:6px;padding:6px 10px;flex:1;min-width:100px;text-align:center}
.counter-box .val{font-size:18px;font-weight:700}
.counter-box .lbl{font-size:9px;color:#6b7280;text-transform:uppercase;letter-spacing:.5px}
.counter-box.green .val{color:#059669}
.counter-box.yellow .val{color:#d97706}
.counter-box.red .val{color:#dc2626}
.counter-box.purple .val{color:#7c3aed}
.counter-box.blue .val{color:#d92b90}
.counter-box.gray .val{color:#6b7280}

/* Event Log */
#event-log{flex:1;overflow-y:auto;border-bottom:1px solid #e2e8f0;background:#fafbfc}
#event-log-header{padding:8px 12px;background:#fff;border-bottom:1px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center;font-size:12px;font-weight:600;color:#1a1a2e}
#event-log-header .filters{display:flex;gap:3px}
#event-log-header .filters button{padding:2px 8px;border:1px solid #d1d5db;border-radius:3px;background:transparent;color:#6b7280;cursor:pointer;font-size:10px}
#event-log-header .filters button.active{background:#f1f5f9;color:#1a1a2e;border-color:#9ca3af}
#event-list{padding:4px 8px;font-size:11px;font-family:'Cascadia Code','Fira Code',monospace}
.event-item{padding:4px 6px;border-bottom:1px solid #f1f5f9;cursor:pointer;border-radius:3px;color:#374151}
.event-item:hover{background:#f1f5f9}
.event-item .ev-time{color:#9ca3af;margin-right:6px}
.event-item .ev-type{font-weight:600;margin-right:6px}
.event-item .ev-type.quality{color:#2563eb}
.event-item .ev-type.enforcement{color:#d97706}
.event-item .ev-type.routing{color:#059669}
.event-item .ev-type.compensation{color:#7c3aed}
.event-item .ev-type.fpv{color:#dc2626}
.event-item .ev-type.lifecycle{color:#6b7280}
.event-item .ev-type.injection{color:#d92b90}
.event-item .ev-type.concentration{color:#ea580c}
.event-why{display:none;margin:4px 0 4px 20px;padding:6px 8px;background:#f1f5f9;border-left:2px solid #d92b90;font-size:10px;color:#4b5563;line-height:1.5}
.event-why.show{display:block}

/* Injection Panel */
#injection-panel{display:none}
#injection-bar{padding:8px 12px;background:#fff;border-top:1px solid #e2e8f0}
#injection-bar .inj-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
#injection-bar .inj-header h3{font-size:11px;color:#d92b90;text-transform:uppercase;letter-spacing:.5px;margin:0}
#injection-bar .inj-header span{font-size:10px;color:#9ca3af}
.inj-buttons{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.inj-btn{padding:4px 10px;border:1px solid #d1d5db;border-radius:4px;background:#fff;color:#374151;cursor:pointer;font-size:11px;transition:all .15s}
.inj-btn:hover{background:#f1f5f9;border-color:#9ca3af}
.inj-btn.danger{border-color:#fca5a5;color:#dc2626}
.inj-btn.danger:hover{background:#fef2f2}
#inj-log{font-size:10px;color:#6b7280;max-height:60px;overflow-y:auto}
.inj-log-item{padding:2px 0;border-bottom:1px solid #f1f5f9}

/* PARTNER VIEW */
#partner-view{flex-direction:column;padding:16px;background:#f8f9fa}
.pv-select{margin-bottom:12px;display:flex;gap:8px;align-items:center}
.pv-select select{padding:6px 10px;background:#fff;color:#1a1a2e;border:1px solid #d1d5db;border-radius:4px;font-size:13px}
.pv-dashboard{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:900px}
.pv-card{background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:14px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.pv-card h3{font-size:12px;color:#6b7280;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.pv-metric{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:13px}
.pv-metric .label{color:#6b7280}
.pv-metric .value{font-weight:600;color:#1a1a2e}
.pv-metric .value.good{color:#059669}
.pv-metric .value.warn{color:#d97706}
.pv-metric .value.bad{color:#dc2626}
.pv-status{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600}
.pv-status.compliant{background:#ecfdf5;color:#059669}
.pv-status.at-risk{background:#fffbeb;color:#d97706}
.pv-status.non-compliant{background:#fef2f2;color:#dc2626}
.pv-status.recovery{background:#f5f3ff;color:#7c3aed}
.pv-status.clear{background:#ecfdf5;color:#059669}
.pv-status.restricted{background:#fffbeb;color:#d97706}
.pv-status.suspended{background:#fef2f2;color:#dc2626}

/* OPS VIEW */
#ops-view{flex-direction:column;padding:16px;background:#f8f9fa}
.ov-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:1000px}
.ov-card{background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:14px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.ov-card h3{font-size:12px;color:#6b7280;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.ov-bar{height:6px;background:#f1f5f9;border-radius:3px;overflow:hidden;margin:4px 0}
.ov-bar-fill{height:100%;border-radius:3px;transition:width .3s}
.ov-partner-row{display:flex;align-items:center;gap:6px;padding:3px 0;font-size:12px;border-bottom:1px solid #f1f5f9}

/* PARAMS VIEW */
#params-view{flex-direction:column;padding:16px;overflow-y:auto;background:#f8f9fa}
.params-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;max-width:1200px}
.param-group{background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:14px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.param-group h3{font-size:12px;color:#d92b90;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.param-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid #f1f5f9}
.param-row .p-label{font-size:11px;color:#6b7280;flex:1}
.param-row .p-id{font-size:10px;color:#9ca3af;margin-right:8px;font-family:monospace}
.param-row input{width:70px;padding:3px 6px;background:#f8f9fa;border:1px solid #d1d5db;border-radius:3px;color:#1a1a2e;font-size:12px;text-align:right}
.param-row input:focus{border-color:#d92b90;outline:none}
.param-changed{background:#fdf2f8 !important;border-color:#d92b90 !important}
#params-actions{margin-top:12px;display:flex;gap:8px}
#params-actions button{padding:6px 16px;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600}
.btn-apply{background:#d92b90;color:#fff}
.btn-reset{background:#f1f5f9;color:#374151;border:1px solid #d1d5db}

/* IMPACT VIEW */
#impact-view{flex-direction:column;padding:16px;background:#f8f9fa}
.impact-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;max-width:1200px;margin-bottom:16px}
.impact-card{background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:14px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.impact-card h3{font-size:12px;color:#6b7280;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.impact-big{font-size:28px;font-weight:700;margin-bottom:2px}
.impact-sub{font-size:11px;color:#6b7280}

/* DOSSIER VIEW */
#dossier-view{flex-direction:column;padding:16px;background:#f8f9fa}
.dos-header{background:#1a1a2e;color:#fff;padding:10px 14px;border-radius:8px 8px 0 0;font-size:11px;text-transform:uppercase;letter-spacing:1px}
.dos-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:900px}

/* PARTNER DASHBOARD (Visibility OS) */
.pd-notice{background:#fffbeb;border:1px solid #fbbf24;border-radius:6px;padding:8px 12px;font-size:11px;color:#92400e;margin-bottom:12px}

/* Connection flow animation */
.flow-item{padding:3px 8px;border-radius:4px;margin:2px 0;font-size:11px;animation:fadeIn .3s}
.flow-item.assigned{background:#eff6ff;border-left:3px solid #2563eb}
.flow-item.declined{background:#fef2f2;border-left:3px solid #dc2626}
.flow-item.accepted{background:#ecfdf5;border-left:3px solid #059669}
.flow-item.expired{background:#f9fafb;border-left:3px solid #9ca3af}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

/* Narrative Bar — Primary explanation layer */
#narrative-bar{padding:12px 16px;background:linear-gradient(135deg,#fdf2f8,#fff);border-bottom:2px solid #f9a8d4;font-size:13px;color:#374151;min-height:70px;display:flex;flex-direction:column;gap:6px;border-left:4px solid #d92b90}
#narrative-bar .nar-header{display:flex;align-items:center;gap:8px;font-size:11px;color:#6b7280}
#narrative-bar .nar-header .nar-day{font-weight:700;color:#d92b90;font-size:13px}
#narrative-bar .nar-header .nar-eval-tag{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
#narrative-bar .nar-eval-tag.eval-day{background:#dbeafe;color:#2563eb}
#narrative-bar .nar-eval-tag.normal-day{background:#f1f5f9;color:#6b7280}
#narrative-bar .nar-text{flex:1;line-height:1.6;font-size:13px}
#narrative-bar .nar-history{border-top:1px solid #f3e8f0;margin-top:6px;padding-top:6px;max-height:60px;overflow-y:auto}
#narrative-bar .nar-prev{font-size:11px;color:#9ca3af;line-height:1.5;margin-bottom:3px;opacity:.7}
#narrative-bar .nar-os{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:600;margin-right:4px}
.os-quality{background:#dbeafe;color:#2563eb}
.os-enforcement{background:#fef3c7;color:#d97706}
.os-routing{background:#d1fae5;color:#059669}
.os-compensation{background:#ede9fe;color:#7c3aed}
.os-fpv{background:#fee2e2;color:#dc2626}
.os-lifecycle{background:#f1f5f9;color:#6b7280}
.os-concentration{background:#ffedd5;color:#ea580c}
.os-injection{background:#fdf2f8;color:#d92b90}

/* OS Badge in Event Log */
.ev-os-badge{display:inline-block;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:600;margin-right:4px;vertical-align:middle}
.ev-plain{font-family:'Segoe UI',system-ui,sans-serif;font-size:12px;color:#374151}
#ev-mode-toggle{padding:2px 6px;border:1px solid #d1d5db;border-radius:3px;background:transparent;color:#6b7280;cursor:pointer;font-size:10px;margin-left:auto}
#ev-mode-toggle:hover{background:#f1f5f9}

/* Injection tooltip */
.inj-btn{position:relative}
.inj-tip{display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:6px 10px;border-radius:4px;font-size:10px;white-space:nowrap;z-index:100;pointer-events:none;line-height:1.3;max-width:250px;white-space:normal;text-align:center}
.inj-btn:hover .inj-tip{display:block}

/* Timeline View */
#timeline-view{flex-direction:column;padding:16px;background:#f8f9fa}
#timeline-view h2{font-size:16px;margin-bottom:4px}
#timeline-view .tl-subtitle{color:#6b7280;font-size:12px;margin-bottom:16px}
.tl-day-group{margin-bottom:16px}
.tl-day-header{font-size:13px;font-weight:700;color:#d92b90;padding:6px 0;border-bottom:1px solid #e2e8f0;margin-bottom:6px;position:sticky;top:0;background:#f8f9fa;z-index:5}
.tl-entry{padding:6px 10px;margin:3px 0;background:#fff;border:1px solid #e2e8f0;border-radius:6px;font-size:12px;line-height:1.5;color:#374151;display:flex;gap:8px;align-items:flex-start}
.tl-entry .tl-os{flex-shrink:0}
.tl-entry .tl-text{flex:1}
.tl-filters{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.tl-filters button{padding:3px 10px;border:1px solid #d1d5db;border-radius:4px;background:#fff;color:#6b7280;cursor:pointer;font-size:11px}
.tl-filters button.active{background:#d92b90;color:#fff;border-color:#d92b90}

/* Reference View */
#reference-view{flex-direction:column;padding:16px;background:#f8f9fa}
#reference-view h2{font-size:16px;margin-bottom:12px}
.ref-tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.ref-tabs button{padding:6px 14px;border:1px solid #d1d5db;border-radius:6px;background:#fff;color:#6b7280;cursor:pointer;font-size:12px;font-weight:600}
.ref-tabs button.active{background:#d92b90;color:#fff;border-color:#d92b90}
.ref-content{max-width:1000px}
.ref-section{margin-bottom:20px}
.ref-section h3{font-size:14px;color:#1a1a2e;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid #e2e8f0}
.ref-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:12px}
.ref-table th{background:#f1f5f9;padding:6px 10px;text-align:left;font-weight:600;color:#6b7280;border:1px solid #e2e8f0}
.ref-table td{padding:6px 10px;border:1px solid #e2e8f0;color:#374151}
.ref-legend-dot{display:inline-block;width:14px;height:14px;border-radius:50%;margin-right:6px;vertical-align:middle}

/* Walkthrough — Simplified Narrative */
.wt-picker{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:16px}
.wt-picker button{padding:6px 14px;border:1px solid #d1d5db;border-radius:6px;background:#fff;color:#6b7280;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s}
.wt-picker button:hover{background:#f1f5f9;color:#1a1a2e}
.wt-picker button.active{background:#d92b90;color:#fff;border-color:#d92b90}
.wt-card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:20px 24px;margin-bottom:12px}
.wt-card h4{font-size:15px;color:#1a1a2e;margin-bottom:4px}
.wt-card .wt-subtitle{font-size:12px;color:#6b7280;margin-bottom:16px}
.wt-scene-header{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.wt-scene-num{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:#d92b90;color:#fff;font-size:12px;font-weight:700;flex-shrink:0}
.wt-scene-title{font-size:13px;font-weight:700;color:#1a1a2e}
.wt-narrative{font-size:12.5px;color:#374151;line-height:1.85;margin-bottom:12px}
.wt-narrative .os{display:inline-block;padding:1px 7px;border-radius:4px;font-size:10px;font-weight:700;margin:0 1px;vertical-align:baseline}
.wt-narrative .os.q{background:#dbeafe;color:#2563eb}
.wt-narrative .os.e{background:#fef3c7;color:#d97706}
.wt-narrative .os.d{background:#d1fae5;color:#059669}
.wt-narrative .os.c{background:#ede9fe;color:#7c3aed}
.wt-narrative .os.f{background:#fee2e2;color:#dc2626}
.wt-narrative .os.l{background:#f1f5f9;color:#6b7280}
.wt-narrative .os.x{background:#ffedd5;color:#ea580c}
.wt-narrative .os.v{background:#fdf2f8;color:#d92b90}
.wt-note{font-size:11px;color:#6b7280;font-style:italic;margin-bottom:14px;padding:6px 10px;background:#f8f9fa;border-radius:5px;border-left:3px solid #d92b90}
.wt-controls{display:flex;gap:8px;align-items:center;margin-top:6px}
.wt-controls button{padding:6px 18px;border:1px solid #d1d5db;border-radius:5px;background:#fff;color:#374151;cursor:pointer;font-size:12px;font-weight:600}
.wt-controls button:hover{background:#f1f5f9}
.wt-controls button.primary{background:#d92b90;color:#fff;border-color:#d92b90}
.wt-controls button.primary:hover{background:#c0247e}
.wt-controls button:disabled{opacity:.4;cursor:default}
.wt-step-info{font-size:11px;color:#6b7280;margin-left:auto}
.wt-key-insight{margin-top:14px;padding:10px 14px;background:linear-gradient(135deg,#fdf2f8,#fff);border:1px solid #f9a8d4;border-radius:8px;font-size:12px;color:#831843;line-height:1.6}

/* Scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#f8f9fa}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#94a3b8}
</style>
</head>
<body>
<div id="app">
<nav id="nav">
  <span class="brand">WIOM SYSTEM SIMULATION</span>
  <button class="active" onclick="switchView('reference')">Start Here</button>
  <button onclick="switchView('system')">System View</button>
  <button onclick="switchView('partner')">Partner Dashboard</button>
  <button onclick="switchView('dossier')">Internal Dossier</button>
  <button onclick="switchView('ops')">Ops View</button>
  <button onclick="switchView('impact')">Impact View</button>

function generatePartners(){
  const partners=[];
  REAL_PARTNERS.forEach((rp,i)=>{
    const baseUptime=rp.bu;
    // Determine initial state based on real performance data
    // Partners who are already NON_COMPLIANT start with AT_RISK domains (P17 counters advanced)
    // This reflects that the OS is kicking in on an existing reality, not a fresh start
    const isNC=rp.iq==='NON_COMPLIANT';
    const isAR=rp.iq==='AT_RISK';
    const isOK=rp.iq==='COMPLIANT';

    // Set initial domain states based on real quality
    const ssState=baseUptime>=SPR.THRESH_SS?'COMPLIANT':'AT_RISK';
    const srState=rp.br<=SPR.THRESH_SR?'COMPLIANT':'AT_RISK';
    const iqState=rp.bi>=SPR.THRESH_IQ?'COMPLIANT':'AT_RISK';

    // For NC partners, advance their P17 counters to reflect they've been poor for a while
    // (the Bharat Monitor already classified 136 as NC based on months of data)
    const p17SS=ssState==='AT_RISK'?(isNC?randInt(2,SPR.P17_SS-1):randInt(0,1)):0;
    const p17SR=srState==='AT_RISK'?(isNC?randInt(2,SPR.P17_SR-1):randInt(0,1)):0;
    const p17IQ=iqState==='AT_RISK'?(isNC?randInt(1,SPR.P17_IQ-1):0):0;

    // Composite: derived from domain states (exact to Quality OS)
    let composite='PENDING'; // Will be set on first evaluation
    if(isOK) composite='COMPLIANT';
    else if(isAR) composite='AT_RISK';
    // NC partners start as AT_RISK — they haven't been evaluated by the NEW system yet
    // The P17 counters will escalate them to NC within the first few windows
    else composite='AT_RISK';

    // Enforcement: NC partners may already be on watch
    let perfState='CLEAR';
    let perfWindowCounter=0;
    if(isNC){
      perfState='PATTERN_WATCH'; // E01=1, immediate on first AT_RISK (structural)
      perfWindowCounter=0; // Will accumulate as sim runs
    }

    // Exposure band based on real tenure
    // rampCycles = how many eval windows they've been through (od / P01)
    // All existing partners have been around 200-640 days — well past any ramp period
    let band='ELIGIBLE_BASELINE';
    let rampCycles=Math.min(SPR.P45,Math.floor(rp.od/SPR.P01));
    let compliantCycles=0;
    if(isOK){
      band='ELIGIBLE_FULL';
      compliantCycles=SPR.P42+1;
    } else if(rampCycles>=SPR.P45){
      // Existing partners past ramp: AR/NC get REDUCED (not stuck at BASELINE)
      band='ELIGIBLE_REDUCED';
    }

    partners.push({
      id:'CSP-'+String(i+1).padStart(3,'0'),
      name:rp.n,
      city:rp.c,
      zoneId:rp.z,
      tier:isOK?'excellent':isAR?'good':'mediocre', // rough mapping for display
      onboardingDay:-rp.od,
      baseUptime:baseUptime,
      baseResolution:rp.br,
      baseIQ:rp.bi,
      acceptProb:rp.ap,
      // Dynamic state — reflects current reality, not Day 0 fresh
      quality:{
        ss:{value:baseUptime,state:ssState,p17Counter:p17SS},
        sr:{value:rp.br,state:srState,p17Counter:p17SR},
        iq:{value:rp.bi,state:iqState,p17Counter:p17IQ},
        composite:composite,
        prevComposite:null,
        wasNonCompliant:false,
        recoveryCounter:0,
        windowsEvaluated:0,
      },
      enforcement:{
        perfState:perfState,
        perfWindowCounter:perfWindowCounter,
        perfRestrictedDay:null,
        fpvState:'FPV_CLEAR',
        fpvFlaggedDay:null,
        fpvType:null,
        fpvSeverity:null,
        suspendedDay:null,
      },
      exposure:{
        band:band,
        compliantCycles:compliantCycles,
        rampCycles:rampCycles,
        recoveryCycles:0,
        concentrationCycles:0,
      },
      connections:{active:rp.ac,pending:0},
      wallet:{balance:randInt(3000,15000),frozen:false,holdAmount:0},
      compensation:{baseThisPeriod:0,bonusThisPeriod:0,bonusTier:'NONE',totalEarned:0},
      stats:{offered:0,accepted:0,declined:0,installed:0,installsThisWindow:0,installSuccessThisWindow:0},
    });
  });
  return partners;
}

// ============================================================
function qualityEvaluateDomain(partner,domain,metric,threshold,p17Limit,isHigherBetter){
  const d=partner.quality[domain];
  const prev=d.state;
  d.value=metric;

  // Check threshold (for resolution: lower is better)
  const meetsThreshold=isHigherBetter?(metric>=threshold):(metric<=threshold);

  if(d.state==='NON_COMPLIANT'){
    // Can only recover if metric improves to at least threshold
    if(meetsThreshold){
      d.state='COMPLIANT';
      d.p17Counter=0;
      return{changed:prev!=='COMPLIANT',prev,now:'COMPLIANT'};
    }
    // Still NC
    return{changed:false,prev,now:'NON_COMPLIANT'};
  }

  if(meetsThreshold){
    d.state='COMPLIANT';
    d.p17Counter=0;
    return{changed:prev!=='COMPLIANT',prev,now:'COMPLIANT'};
  }else{
    // Below threshold
    d.p17Counter++;
    if(d.p17Counter>=p17Limit){
      // P17 chronic escalation
      d.state='NON_COMPLIANT';
      return{changed:true,prev,now:'NON_COMPLIANT',chronic:true,windowCount:d.p17Counter};
    }else{
      d.state='AT_RISK';
      return{changed:prev!=='AT_RISK',prev,now:'AT_RISK',windowCount:d.p17Counter};
    }
  }
}

function qualityEvaluatePartner(partner){
  // Skip if below minimum connections (P12)
  if(partner.connections.active<SPR.P12){
    return; // Not enough data to evaluate
  }

  // Compute metrics with noise
  const ssMetric=Math.max(0,Math.min(100,partner.baseUptime+randRange(-3,3)));
  const srMetric=Math.max(0,partner.baseResolution+randRange(-1,1));
  // IQ: skip if not enough installs (P18)
  const hasEnoughInstalls=partner.stats.installsThisWindow>=SPR.P18;
  const iqMetric=hasEnoughInstalls?Math.max(0,Math.min(100,partner.baseIQ+randRange(-4,4))):null;

  const reasons=[];

  // Evaluate SS
  const ssResult=qualityEvaluateDomain(partner,'ss',ssMetric,SPR.THRESH_SS,SPR.P17_SS,true);
  if(ssResult.changed){
    let r=`Service Stability: ${ssMetric.toFixed(1)}% (threshold: ${SPR.THRESH_SS}%) → ${ssResult.now}`;
    if(ssResult.chronic)r+=` [P17 chronic: ${ssResult.windowCount} consecutive AT_RISK windows >= P17-SS(${SPR.P17_SS})]`;
    reasons.push(r);
  }

  // Evaluate SR
  const srResult=qualityEvaluateDomain(partner,'sr',srMetric,SPR.THRESH_SR,SPR.P17_SR,false);
  if(srResult.changed){
    let r=`Service Resolution: ${srMetric.toFixed(1)}h (threshold: ${SPR.THRESH_SR}h) → ${srResult.now}`;
    if(srResult.chronic)r+=` [P17 chronic: ${srResult.windowCount} consecutive AT_RISK windows >= P17-SR(${SPR.P17_SR})]`;
    reasons.push(r);
  }

  // Evaluate IQ (only if enough installs)
  if(iqMetric!==null){
    const iqResult=qualityEvaluateDomain(partner,'iq',iqMetric,SPR.THRESH_IQ,SPR.P17_IQ,true);
    if(iqResult.changed){
      let r=`Installation Quality: ${iqMetric.toFixed(1)}% (threshold: ${SPR.THRESH_IQ}%) → ${iqResult.now}`;
      if(iqResult.chronic)r+=` [P17 chronic: ${iqResult.windowCount} windows >= P17-IQ(${SPR.P17_IQ})]`;
      reasons.push(r);
    }
  }

  // Compute composite
  const ss=partner.quality.ss.state;
  const sr=partner.quality.sr.state;
  const iq=partner.quality.iq.state;
  const prevComposite=partner.quality.composite;

  let composite;
  if(ss==='NON_COMPLIANT'||sr==='NON_COMPLIANT'||iq==='NON_COMPLIANT'){
    composite='NON_COMPLIANT';
  }else if(ss==='AT_RISK'||sr==='AT_RISK'||iq==='AT_RISK'){
    composite='AT_RISK';
  }else if(ss==='COMPLIANT'&&sr==='COMPLIANT'&&(iq==='COMPLIANT'||iq==='PENDING')){
    composite='COMPLIANT';
  }else{
    composite=prevComposite==='PENDING'?'PENDING':prevComposite;
  }

  // RECOVERY detection: was NC, now not NC, but not yet proven COMPLIANT
  if(prevComposite==='NON_COMPLIANT'&&composite!=='NON_COMPLIANT'&&composite!=='COMPLIANT'){
    composite='RECOVERY';
    partner.quality.recoveryCounter++;
  }else if(prevComposite==='RECOVERY'){
    if(composite==='COMPLIANT'){
      partner.quality.recoveryCounter=0;
      partner.quality.wasNonCompliant=false;
    }else if(composite==='NON_COMPLIANT'){
      partner.quality.recoveryCounter=0;
      composite='NON_COMPLIANT';
    }else{
      partner.quality.recoveryCounter++;
      composite='RECOVERY';
    }
  }

  if(composite==='NON_COMPLIANT')partner.quality.wasNonCompliant=true;

  partner.quality.prevComposite=prevComposite;
  partner.quality.composite=composite;
  partner.quality.windowsEvaluated++;

  // Reset per-window stats
  partner.stats.installsThisWindow=0;
  partner.stats.installSuccessThisWindow=0;

  // Emit event if composite changed
  if(composite!==prevComposite&&prevComposite!==null){
    reasons.unshift(`Composite: ${prevComposite} → ${composite}`);
    emit('QUAL_STATE_'+composite,'quality',partner.id,
      `${partner.name}: ${prevComposite} → ${composite}`,
      reasons.concat([`Rule: Quality_OS §6, evaluation window ${partner.quality.windowsEvaluated}`])
    );

    // Queue P15 delayed consequence if moving to worse state
    if(composite==='NON_COMPLIANT'||composite==='AT_RISK'){
      S.pendingP15.push({
        triggerDay:S.day+SPR.P15,
        partnerId:partner.id,
        type:'QUALITY_CONSEQUENCE',
        composite:composite,
      });
    }
  }
}

function enforcementPerformanceTrack(partner){
  const q=partner.quality.composite;
  const e=partner.enforcement;
  const prev=e.perfState;
  const reasons=[];

  // INV-ENF-06: Auto-clear on COMPLIANT (immediate, no probation)
  if(q==='COMPLIANT'){
    if(prev!=='CLEAR'){
      e.perfState='CLEAR';
      e.perfWindowCounter=0;
      reasons.push(`COMPLIANT received → auto-clear to CLEAR (INV-ENF-06, no probation)`);
      reasons.push(`Counter reset to 0`);
      emit('ENF_PERF_CLEAR','enforcement',partner.id,
        `${partner.name}: ${prev} → CLEAR (auto-clear)`,
        reasons.concat(['Rule: Enforcement_OS §6.1, INV-ENF-06'])
      );
      // Lift restrictions
      if(prev==='RESTRICTED'||prev==='PRE_EXIT'){
        emit('ENFORCE_TRIGGER_RESTRICTION_LIFTED','enforcement',partner.id,
          `${partner.name}: Restriction lifted`,
          ['COMPLIANT restored','Bonus eligibility resumes','Routing allocation restores',
           'Rule: Enforcement_OS §7, ENFORCE_TRIGGER_RESTRICTION_LIFTED']
        );
      }
    }
    return;
  }

  // INV-ENF-05: Recovery freeze
  if(q==='RECOVERY'){
    reasons.push(`RECOVERY received → enforcement FREEZE (INV-ENF-05)`);
    reasons.push(`Current posture ${e.perfState} held. No escalation. No rollback.`);
    reasons.push(`Counter frozen at ${e.perfWindowCounter} (not reset)`);
    // Don't emit unless first time entering freeze
    if(prev!==e.perfState){
      emit('ENF_PERF_FREEZE','enforcement',partner.id,
        `${partner.name}: Enforcement frozen during RECOVERY`,reasons
      );
    }
    return;
  }

  // AT_RISK: enter PATTERN_WATCH (E01=1, immediate, structural)
  if(q==='AT_RISK'){
    if(e.perfState==='CLEAR'){
      e.perfState='PATTERN_WATCH';
      e.perfWindowCounter=0;
      emit('ENF_PATTERN_WATCH','enforcement',partner.id,
        `${partner.name}: CLEAR → PATTERN_WATCH (internal)`,
        [`AT_RISK detected → immediate entry (E01=${SPR.E01}, structural)`,
         'PATTERN_WATCH is internal — CSP does not see this state',
         'Rule: Enforcement_OS §6.1, E01']
      );
    }
    // If already in PATTERN_WATCH or higher, AT_RISK doesn't escalate further
    // but doesn't reset counter either
    return;
  }

  // NON_COMPLIANT: count windows, escalate
  if(q==='NON_COMPLIANT'){
    e.perfWindowCounter++;

    if(e.perfState==='CLEAR'){
      // Jump to PATTERN_WATCH first (might happen if first eval is NC)
      e.perfState='PATTERN_WATCH';
      emit('ENF_PATTERN_WATCH','enforcement',partner.id,
        `${partner.name}: CLEAR → PATTERN_WATCH`,
        ['NON_COMPLIANT detected, entering PATTERN_WATCH first',
         'Rule: Enforcement_OS §6.1']
      );
    }

    if(e.perfState==='PATTERN_WATCH'&&e.perfWindowCounter>=SPR.E02){
      e.perfState='RESTRICTED';
      e.perfRestrictedDay=S.day;
      e.perfWindowCounter=0; // reset for next stage counting
      emit('ENF_RESTRICTED','enforcement',partner.id,
        `${partner.name}: PATTERN_WATCH → RESTRICTED`,
        [`NON_COMPLIANT for ${SPR.E02} consecutive windows >= E02(${SPR.E02})`,
         'ENFORCE_TRIGGER_RESTRICTION emitted',
         'Downstream: Compensation → bonus paused, Allocation → routing tapered',
         'Rule: Enforcement_OS §6.1, E02']
      );
    }else if(e.perfState==='RESTRICTED'&&e.perfWindowCounter>=SPR.E03){
      e.perfState='PRE_EXIT';
      emit('ENF_PRE_EXIT','enforcement',partner.id,
        `${partner.name}: RESTRICTED → PRE_EXIT`,
        [`NON_COMPLIANT for ${SPR.E03} additional windows beyond RESTRICTED >= E03(${SPR.E03})`,
         'ENFORCE_TRIGGER_PRE_EXIT emitted → Exit OS begins B1 viability assessment',
         'CSP participation under formal review',
         'Rule: Enforcement_OS §6.1, E03']
      );
    }
  }
}

function enforcementFPVTrack(partner,fpvType,severity){
  const e=partner.enforcement;
  const reasons=[];

  if(e.fpvState==='FPV_CLEAR'){
    e.fpvState='FPV_FLAGGED';
    e.fpvFlaggedDay=S.day;
    e.fpvType=fpvType;
    e.fpvSeverity=severity;
    const suspDay=S.day+SPR.E04;
    const termDay=severity==='CRITICAL'?suspDay+1:S.day+SPR.E04*2;
    const why=[
      `FPV event detected: ${fpvType}`,
      `Severity: ${severity}`,
      `Investigation starts now — ${SPR.E04}-day window (Day ${S.day} → Day ${suspDay})`,
      severity==='CRITICAL'
        ?`CRITICAL: auto-suspend Day ${suspDay}, terminate Day ${termDay} (fast track)`
        :`SERIOUS: auto-suspend Day ${suspDay} if unresolved, terminate Day ${termDay}`,
      'Wallet frozen, no new customers routed during investigation',
      'Performance ladder bypassed entirely (P15 BYPASS)',
      'Rule: Enforcement_OS §6.2, FPV Bypass Rule'
    ];
    emit('ENF_FPV_FLAGGED','fpv',partner.id,
      `${partner.name}: FPV FLAGGED — ${fpvType} (${severity}). Investigation: ${SPR.E04} days → suspend Day ${suspDay} → terminate Day ${termDay}`,why
    );
    // Freeze wallet
    partner.wallet.frozen=true;
    partner.wallet.holdAmount=severity==='CRITICAL'?partner.wallet.balance:Math.min(50000,partner.wallet.balance);
  }
}

function enforcementFPVTick(partner){
  const e=partner.enforcement;
  if(e.fpvState!=='FPV_FLAGGED'&&e.fpvState!=='SUSPENDED')return;

  // FPV_FLAGGED: check if investigation window expired
  if(e.fpvState==='FPV_FLAGGED'&&e.fpvFlaggedDay!==null){
    const elapsed=S.day-e.fpvFlaggedDay;
    if(elapsed>=SPR.E04&&SPR.E05){
      // Auto-suspend
      e.fpvState='SUSPENDED';
      e.suspendedDay=S.day;
      const termDay2=e.fpvSeverity==='CRITICAL'?S.day+1:e.fpvFlaggedDay+SPR.E04*2;
      emit('ENF_SUSPENDED','fpv',partner.id,
        `${partner.name}: FPV_FLAGGED → SUSPENDED (Day ${elapsed} of investigation — window expired)`,
        [`${SPR.E04}-day investigation window expired without resolution (flagged Day ${e.fpvFlaggedDay})`,
         'All routing stopped — zero new customers',
         'All payouts frozen, existing customers being migrated',
         e.fpvSeverity==='CRITICAL'?`CRITICAL severity: termination tomorrow (Day ${termDay2})`:`Next: termination on Day ${termDay2} if no resolution (${termDay2-S.day} days remaining)`,
         'Rule: Enforcement_OS §6.2, E04/E05']
      );
    }
  }

  // SUSPENDED: check for termination (2×E04 without resolution)
  if(e.fpvState==='SUSPENDED'&&e.suspendedDay!==null){
    const elapsed=S.day-e.fpvFlaggedDay;
    if(elapsed>=SPR.E04*2||(e.fpvSeverity==='CRITICAL'&&S.day-e.suspendedDay>=1)){
      e.fpvState='TERMINATED';
      const totalDays=S.day-e.fpvFlaggedDay;
      emit('ENF_TERMINATED','fpv',partner.id,
        `${partner.name}: SUSPENDED → TERMINATED (irreversible, ${totalDays} days since flagging)`,
        [e.fpvSeverity==='CRITICAL'?`Severity = CRITICAL → fast-track termination (1 day after suspension)`:`Full investigation + suspension period exhausted (${totalDays} of ${SPR.E04*2} days)`,
         'TERMINATED is irreversible — no appeal (INV-ENF-08)',
         'Exit OS activated: formal notice → customer migration → asset recovery',
         `Timeline: Flagged Day ${e.fpvFlaggedDay} → Suspended Day ${e.suspendedDay} → Terminated Day ${S.day}`,
         'Rule: Enforcement_OS §6.2, INV-ENF-08']
      );
    }
  }
}

// ============================================================
// SECTION 10: D&A ROUTING ENGINE
// ============================================================
function getExposureBand(partner){
  const q=partner.quality.composite;
  const e=partner.enforcement;

  // INELIGIBLE checks
  if(e.fpvState==='SUSPENDED'||e.fpvState==='TERMINATED')return'INELIGIBLE_ENFORCEMENT';
  if(q==='NON_COMPLIANT')return'INELIGIBLE_QUALITY';

  // ELIGIBLE_CAPPED check (concentration)
  if(partner.exposure.band==='ELIGIBLE_CAPPED')return'ELIGIBLE_CAPPED';

  // Ramp period
  if(partner.exposure.rampCycles<SPR.P45)return'ELIGIBLE_BASELINE';

  // Recovery window
  if(q==='RECOVERY'||partner.exposure.recoveryCycles>0&&partner.exposure.recoveryCycles<SPR.P43)
    return'ELIGIBLE_REDUCED';

  // AT_RISK
  if(q==='AT_RISK')return'ELIGIBLE_REDUCED';

  // COMPLIANT for enough cycles
  if(q==='COMPLIANT'&&partner.exposure.compliantCycles>=SPR.P42)return'ELIGIBLE_FULL';

  // COMPLIANT but not enough cycles yet
  if(q==='COMPLIANT')return'ELIGIBLE_REDUCED';

  return'ELIGIBLE_BASELINE';
}

function getExposureMultiplier(band){
  switch(band){
    case'ELIGIBLE_FULL':return 1.0;
    case'ELIGIBLE_REDUCED':return SPR.P44;
    case'ELIGIBLE_BASELINE':return SPR.P53;
    default:return 0;
  }
}

function getQualityRank(composite){
  switch(composite){
    case'COMPLIANT':return 3;
    case'AT_RISK':case'RECOVERY':return 2;
    case'PENDING':return 1;
    default:return 0;
  }
}

function routeConnection(zoneId){
  // Get eligible CSPs in this zone
  const zoneCsps=S.partners.filter(p=>p.zoneId===zoneId);
  const eligible=[];
  const ineligibleReasons={};

  zoneCsps.forEach(p=>{
    const band=p.exposure.band;
    // Stage 1: Eligibility Gate
    if(band.startsWith('INELIGIBLE')){
      ineligibleReasons[p.id]=`${band}`;return;
    }
    if(band==='ELIGIBLE_CAPPED'){
      ineligibleReasons[p.id]='ELIGIBLE_CAPPED (concentration throttle)';return;
    }
    if(p.enforcement.perfState==='PRE_EXIT'){
      // Still eligible but may be under review
    }
    if(p.enforcement.fpvState==='SUSPENDED'||p.enforcement.fpvState==='TERMINATED'){
      ineligibleReasons[p.id]='Enforcement suspended/terminated';return;
    }
    // Capacity check (P46)
    const cap=SPR.P46;
    if(p.connections.active+p.connections.pending>=cap){
      ineligibleReasons[p.id]=`At capacity (${p.connections.active+p.connections.pending}/${cap})`;return;
    }
    eligible.push(p);
  });

  if(eligible.length===0){
    return{success:false,reason:'No eligible CSP in zone',ineligibleReasons};
  }

  // Stage 2: Quality Rank (categorical)
  eligible.sort((a,b)=>{
    const qa=getQualityRank(a.quality.composite);
    const qb=getQualityRank(b.quality.composite);
    if(qa!==qb)return qb-qa; // higher rank first

    // Stage 3: Utilization (lower load ratio preferred)
    const loadA=(a.connections.active+a.connections.pending)/SPR.P46;
    const loadB=(b.connections.active+b.connections.pending)/SPR.P46;
    if(Math.abs(loadA-loadB)>0.01)return loadA-loadB;

    // Stage 4: Tiebreaker (earlier onboarding)
    return a.onboardingDay-b.onboardingDay;
  });

  const selected=eligible[0];
  return{
    success:true,
    csp:selected,
    eligible:eligible.map(p=>p.id),
    ineligibleReasons,
    reasons:[
      `Zone: ${zoneId}, ${eligible.length} eligible CSPs`,
      `Selected: ${selected.id} (${selected.name})`,
      `Quality: ${selected.quality.composite}, Load: ${((selected.connections.active+selected.connections.pending)/SPR.P46*100).toFixed(0)}%`,
      `Routing: Quality rank → Utilization → Onboarding date`,
      'Rule: D&A_OS §4.3, hierarchical routing'
    ],
  };
}

// ============================================================
// SECTION 11: CONNECTION LIFECYCLE ENGINE
// ============================================================
function processNewRequests(){
  ZONES.forEach(zone=>{
    // Generate demand (baseDemand ± random)
    let demand=zone.baseDemand+randInt(-1,2);
    if(demand<0)demand=0;

    // Check for demand spike injection
    const spike=S.injections.find(inj=>inj.type==='demand_spike'&&inj.zoneId===zone.id&&inj.endDay>=S.day);
    if(spike)demand+=spike.extraDemand;

    for(let i=0;i<demand;i++){
      const connId='CONN-'+String(nextConnId++).padStart(5,'0');
      const result=routeConnection(zone.id);

      if(!result.success){
        emit('CONN_EXPIRED','routing',null,
          `Connection ${connId} in ${zone.name}: NO ELIGIBLE CSP`,
          ['All CSPs in zone are either at capacity, ineligible, or none exist',
           ...Object.entries(result.ineligibleReasons).map(([id,r])=>`${id}: ${r}`),
           'Rule: D&A_OS §4.3, routing failure']
        );
        S.connectionFlows.push({day:S.day,connId,zoneId:zone.id,type:'expired',cspId:null});
        continue;
      }

      const csp=result.csp;
      csp.stats.offered++;

      // CSP accept/decline (based on probability + enforcement state)
      let acceptProb=csp.acceptProb;
      // Check if CSP has injection to reject all
      const rejectInj=S.injections.find(inj=>inj.type==='reject'&&inj.cspId===csp.id&&inj.endDay>=S.day);
      if(rejectInj)acceptProb=0.05; // almost always reject

      const accepts=rng()<acceptProb;

      if(accepts){
        const conn={
          id:connId,zoneId:zone.id,cspId:csp.id,state:'PENDING_INSTALL',
          createdDay:S.day,assignedDay:S.day,acceptedDay:S.day,activatedDay:null,
          lastRechargeDay:null,nextRechargeDay:null,pausedDay:null,retryCount:0,
          declinedBy:[],installDay:S.day+randInt(1,SPR.P74),
        };
        S.connections.push(conn);
        csp.connections.pending++;
        csp.stats.accepted++;

        emit('CONN_ACCEPTED','routing',csp.id,
          `${connId} → ${csp.name} (${zone.name}) — Accepted`,
          result.reasons.concat(['CSP accepted assignment']),
          {connId,zoneId:zone.id}
        );
        S.connectionFlows.push({day:S.day,connId,zoneId:zone.id,type:'accepted',cspId:csp.id,cspName:csp.name});
      }else{
        csp.stats.declined++;
        // Decline: try next eligible CSP
        const retryResult=routeConnection(zone.id);
        if(retryResult.success&&retryResult.csp.id!==csp.id){
          const csp2=retryResult.csp;
          csp2.stats.offered++;
          if(rng()<csp2.acceptProb){
            const conn={
              id:connId,zoneId:zone.id,cspId:csp2.id,state:'PENDING_INSTALL',
              createdDay:S.day,assignedDay:S.day,acceptedDay:S.day,activatedDay:null,
              lastRechargeDay:null,nextRechargeDay:null,pausedDay:null,retryCount:1,
              declinedBy:[csp.id],installDay:S.day+randInt(1,SPR.P74),
            };
            S.connections.push(conn);
            csp2.connections.pending++;
            csp2.stats.accepted++;
            emit('CONN_REROUTED','routing',csp2.id,
              `${connId}: ${csp.name} declined → rerouted to ${csp2.name}`,
              [`${csp.name} declined (acceptance prob: ${(csp.acceptProb*100).toFixed(0)}%)`,
               `Rerouted to ${csp2.name}`,
               'Rule: D&A_OS §4.1, DECLINED → immediate re-entry'],
              {connId,zoneId:zone.id}
            );
            S.connectionFlows.push({day:S.day,connId,zoneId:zone.id,type:'declined',cspId:csp.id,cspName:csp.name,rerouted:csp2.name});
          }else{
            csp2.stats.declined++;
            S.connectionFlows.push({day:S.day,connId,zoneId:zone.id,type:'expired',cspId:null,reason:`${csp.name} and ${csp2.name} both declined`});
          }
        }else{
          emit('CONN_DECLINED_EXPIRED','routing',csp.id,
            `${connId}: ${csp.name} declined, no alternative CSP`,
            [`${csp.name} declined. No other eligible CSP in zone.`],{connId}
          );
          S.connectionFlows.push({day:S.day,connId,zoneId:zone.id,type:'expired',cspId:null,reason:`${csp.name} declined, no alternative`});
        }
      }
    }
  });
}

function processConnectionLifecycle(){
  // Track per-partner lifecycle summary for events
  const lcSum={};// partnerId → {recharged,paused,returned,churned,installed}
  const lc=(pid,key)=>{if(!lcSum[pid])lcSum[pid]={recharged:0,paused:0,returned:0,churned:0,installed:0};lcSum[pid][key]++};

  S.connections.forEach(conn=>{
    if(conn.state==='PENDING_INSTALL'){
      // Check if install day reached
      if(S.day>=conn.installDay){
        const csp=S.partners.find(p=>p.id===conn.cspId);
        if(!csp)return;
        // Install success based on CSP's IQ
        const success=rng()<(csp.baseIQ/100);
        csp.stats.installsThisWindow++;
        if(success){
          conn.state='ACTIVE';
          conn.activatedDay=S.day;
          conn.lastRechargeDay=S.day;
          conn.nextRechargeDay=S.day+SPR.RECHARGE_CYCLE;
          csp.connections.pending--;
          csp.connections.active++;
          csp.stats.installed++;
          csp.stats.installSuccessThisWindow++;
          lc(csp.id,'installed');
        }else{
          // Failed install — retry
          conn.retryCount++;
          if(conn.retryCount>=SPR.P78){
            conn.state='DEACTIVATED';
            csp.connections.pending--;
            emit('CONN_INSTALL_FAILED','lifecycle',csp.id,
              `${conn.id}: Install failed ${SPR.P78} times → DEACTIVATED`,
              [`Max retries P78(${SPR.P78}) reached`,'Rule: CL_OS §T3']
            );
          }else{
            conn.installDay=S.day+randInt(1,SPR.P74);
          }
        }
      }
    }

    if(conn.state==='ACTIVE'){
      // Check recharge
      if(S.day>=conn.nextRechargeDay){
        // Customer recharges with some probability
        if(rng()<0.85){
          conn.lastRechargeDay=S.day;
          conn.nextRechargeDay=S.day+SPR.RECHARGE_CYCLE+randInt(-3,5);
          // Compensation: payout to CSP
          const csp=S.partners.find(p=>p.id===conn.cspId);
          if(csp&&!csp.wallet.frozen){
            csp.wallet.balance+=SPR.RC01;
            csp.compensation.baseThisPeriod+=SPR.RC01;
            csp.compensation.totalEarned+=SPR.RC01;
          }
          lc(conn.cspId,'recharged');
        }else{
          // Customer didn't recharge → pause
          conn.state='PAUSED';
          conn.pausedDay=S.day;
          const csp=S.partners.find(p=>p.id===conn.cspId);
          if(csp)csp.connections.active--;
          lc(conn.cspId,'paused');
        }
      }
    }

    if(conn.state==='PAUSED'){
      // Check if customer comes back (decreasing probability over time)
      const daysPaused=S.day-conn.pausedDay;
      if(daysPaused>0&&daysPaused%7===0&&rng()<0.3){
        // Customer recharges
        conn.state='ACTIVE';
        conn.lastRechargeDay=S.day;
        conn.nextRechargeDay=S.day+SPR.RECHARGE_CYCLE;
        conn.pausedDay=null;
        const csp=S.partners.find(p=>p.id===conn.cspId);
        if(csp){
          csp.connections.active++;
          if(!csp.wallet.frozen){
            csp.wallet.balance+=SPR.RC01;
            csp.compensation.baseThisPeriod+=SPR.RC01;
            csp.compensation.totalEarned+=SPR.RC01;
          }
        }
        lc(conn.cspId,'returned');
      }
      // Check P76 max pause
      if(S.day-conn.pausedDay>=SPR.P76){
        conn.state='DEACTIVATED';
        lc(conn.cspId,'churned');
      }
    }
  });

  // Emit per-partner lifecycle summary events (only when something happened)
  for(const[pid,s]of Object.entries(lcSum)){
    const p=S.partners.find(x=>x.id===pid);
    if(!p)continue;
    const parts=[];
    if(s.recharged)parts.push(`${s.recharged} renewed`);
    if(s.paused)parts.push(`${s.paused} paused`);
    if(s.returned)parts.push(`${s.returned} returned`);
    if(s.churned)parts.push(`${s.churned} churned`);
    if(s.installed)parts.push(`${s.installed} installed`);
    if(parts.length){
      emit('CONN_LIFECYCLE','lifecycle',pid,
        `${p.name}: ${parts.join(', ')}`,
        [`Active: ${p.connections.active}`,`Rule: CL_OS §T1-T4`]
      );
    }
  }
}

// ============================================================
// SECTION 12: COMPENSATION ENGINE
// ============================================================
function calculateBonusTier(partner){
  if(partner.enforcement.perfState==='RESTRICTED'||partner.enforcement.perfState==='PRE_EXIT')return'NONE';
  if(partner.wallet.frozen)return'NONE';
  const q=partner.quality.composite;
  if(q==='NON_COMPLIANT'||q==='PENDING')return'NONE';
  if(q==='AT_RISK'||q==='RECOVERY')return'GOOD';
  if(q==='COMPLIANT'){
    if(partner.exposure.compliantCycles>=6)return'EXCELLENT';
    if(partner.exposure.compliantCycles>=3)return'VERY_GOOD';
    return'GOOD';
  }
  return'NONE';
}

function processCompensation(){
  // Runs twice per week (every 3-4 days)
  if(S.day%4!==0)return;

  S.partners.forEach(p=>{
    const prevTier=p.compensation.bonusTier;
    p.compensation.bonusTier=calculateBonusTier(p);

    // Calculate bonus for this period
    let bonusPerRecharge=0;
    switch(p.compensation.bonusTier){
      case'GOOD':bonusPerRecharge=SPR.BONUS_GOOD;break;
      case'VERY_GOOD':bonusPerRecharge=SPR.BONUS_VG;break;
      case'EXCELLENT':bonusPerRecharge=SPR.BONUS_EX;break;
    }

    // Count recharges this period (simplified: active connections / recharge cycle * period)
    const rechargesThisPeriod=Math.floor(p.connections.active*4/SPR.RECHARGE_CYCLE);
    const bonus=rechargesThisPeriod*bonusPerRecharge;

    if(bonus>0&&!p.wallet.frozen){
      p.wallet.balance+=bonus;
      p.compensation.bonusThisPeriod=bonus;
      p.compensation.totalEarned+=bonus;
    }

    if(prevTier!==p.compensation.bonusTier&&p.quality.composite!=='PENDING'){
      emit('COMP_BONUS_CHANGE','compensation',p.id,
        `${p.name}: Bonus tier ${prevTier} → ${p.compensation.bonusTier}`,
        [`Quality: ${p.quality.composite}, Enforcement: ${p.enforcement.perfState}`,
         `Compliant cycles: ${p.exposure.compliantCycles}`,
         `Rule: Compensation_OS, bonus tier based on quality composite + enforcement posture`]
      );
    }
  });
}

// ============================================================
// SECTION 13: EXPOSURE BAND UPDATE
// ============================================================
function updateExposureBands(){
  S.partners.forEach(p=>{
    const prevBand=p.exposure.band;

    // Track cycles
    if(p.quality.composite==='COMPLIANT'){
      p.exposure.compliantCycles++;
      p.exposure.recoveryCycles=0;
    }else if(p.quality.composite==='RECOVERY'){
      p.exposure.recoveryCycles++;
    }else{
      p.exposure.compliantCycles=0;
    }
    p.exposure.rampCycles++;

    const newBand=getExposureBand(p);
    p.exposure.band=newBand;

    if(newBand!==prevBand){
      emit('EXPOSURE_CHANGE','routing',p.id,
        `${p.name}: Exposure ${prevBand} → ${newBand}`,
        [`Quality: ${p.quality.composite}, Compliant cycles: ${p.exposure.compliantCycles}`,
         `Ramp cycles: ${p.exposure.rampCycles}/${SPR.P45}`,
         newBand==='INELIGIBLE_QUALITY'?'NON_COMPLIANT → zero new allocation':'',
         `Rule: D&A_OS §4.2, exposure state re-evaluation`].filter(Boolean)
      );
    }
  });
}

// ============================================================
// SECTION 14: CONCENTRATION PROTECTION (INV-DAO-16)
// ============================================================
function checkConcentration(){
  ZONES.forEach(zone=>{
    const zoneCsps=S.partners.filter(p=>p.zoneId===zone.id);
    const totalActive=zoneCsps.reduce((s,p)=>s+p.connections.active,0);
    if(totalActive===0)return;

    zoneCsps.forEach(p=>{
      const share=(p.connections.active/totalActive)*100;
      const multiplier=zone.classification==='ZC-A'?SPR.P59_A:zone.classification==='ZC-B'?SPR.P59_B:SPR.P59_C;

      if(share>=SPR.P56){
        p.exposure.concentrationCycles++;
        const tier1=Math.ceil(SPR.P58*multiplier);
        const tier2=Math.ceil(2*SPR.P58*multiplier);
        const tier3=Math.ceil(3*SPR.P58*multiplier);

        if(p.exposure.concentrationCycles>=tier3&&p.exposure.band!=='ELIGIBLE_CAPPED'){
          p.exposure.band='ELIGIBLE_CAPPED';
          emit('CONCENTRATION_TIER3','concentration',p.id,
            `${p.name}: ELIGIBLE_CAPPED in ${zone.name} (${share.toFixed(0)}% share)`,
            [`Zone share ${share.toFixed(1)}% >= P56(${SPR.P56}%) for ${p.exposure.concentrationCycles} cycles`,
             `Tier 3 threshold: ${tier3} cycles (P58×P59×3 = ${SPR.P58}×${multiplier}×3)`,
             'Auto-cap applied: zero new allocation in this zone',
             'Rule: D&A_OS §4.2, INV-DAO-16 Tier 3']
          );
        }else if(p.exposure.concentrationCycles>=tier2&&p.exposure.concentrationCycles<tier3){
          emit('CONCENTRATION_TIER2','concentration',p.id,
            `${p.name}: Concentration CRITICAL in ${zone.name} (${share.toFixed(0)}%)`,
            [`Tier 2: binding escalation. Capacity OS must respond.`,'Rule: INV-DAO-16']
          );
        }else if(p.exposure.concentrationCycles===tier1){
          emit('CONCENTRATION_TIER1','concentration',p.id,
            `${p.name}: Concentration ADVISORY in ${zone.name} (${share.toFixed(0)}%)`,
            [`Tier 1: advisory signal to Capacity OS`,'Rule: INV-DAO-16']
          );
        }
      }else{
        p.exposure.concentrationCycles=0;
        // Lift cap if below threshold
        if(p.exposure.band==='ELIGIBLE_CAPPED'){
          p.exposure.band=getExposureBand(p);
        }
      }
    });
  });
}

// SECTION 15: P15 DELAYED CONSEQUENCES
// ============================================================
function processP15Queue(){
  const due=S.pendingP15.filter(item=>S.day>=item.triggerDay);
  due.forEach(item=>{
    // Remove from queue
    S.pendingP15=S.pendingP15.filter(i=>i!==item);
    // The consequence has already been handled by enforcement tracking
    // P15 mainly affects the timing of dashboard updates vs consequence triggers
    // In our simulation, we process enforcement after quality eval
    // The P15 delay is modeled in the enforcement window counting
  });
}

// ============================================================
// SECTION 16: SIMULATION LOOP
// ============================================================
function saveSnapshot(){
  // Deep clone S for step-back (exclude non-serializable props)
  const snap=JSON.parse(JSON.stringify(S,(_,v)=>typeof v==='number'&&!isFinite(v)?null:v));
  stateHistory.push(snap);
  if(stateHistory.length>30)stateHistory.shift();
  const bb=document.getElementById('back-btn');
  if(bb)bb.style.opacity='1';
}

function simStepBack(){
  simPause();
  if(stateHistory.length===0)return;
  const snap=stateHistory.pop();
  S=snap;
  S.timer=null;
  S.running=false;
  render();
  // Update back button opacity
  const bb=document.getElementById('back-btn');
  if(bb)bb.style.opacity=stateHistory.length>0?'1':'.4';
}

function simulateDay(){
  if(S.day>=SPR.SIM_DAYS){
    simPause();
    document.getElementById('sim-status').textContent='Simulation Complete';
    return;
  }
  // Save snapshot for step-back before mutating
  saveSnapshot();
  S.day++;
  S.connectionFlows=[];

  // 1. Process pending P15 consequences
  processP15Queue();

  // 2. Generate and route new connection requests
  processNewRequests();

  // 3. Process connection lifecycle (installs, recharges, pauses)
  processConnectionLifecycle();

  // 4. Quality evaluation (every P01 days)
  if(S.day%SPR.P01===0){
    S.qualityWindow++;
    S.partners.forEach(p=>{
      if(p.enforcement.fpvState!=='TERMINATED'){
        qualityEvaluatePartner(p);
      }
    });

    // 5. Enforcement evaluation (reads quality, same cycle)
    S.partners.forEach(p=>{
      if(p.enforcement.fpvState!=='TERMINATED'){
        enforcementPerformanceTrack(p);
      }
    });

    // 6. Update exposure bands
    updateExposureBands();

    // 7. Check concentration
    checkConcentration();
  }

  // 8. FPV tick (daily — investigation timers)
  S.partners.forEach(p=>enforcementFPVTick(p));

  // 9. Compensation (every 4 days ≈ twice weekly)
  processCompensation();

  // 10. Process injections that expire
  S.injections=S.injections.filter(inj=>!inj.endDay||inj.endDay>=S.day);

  // 11. Generate narrative and timeline
  generateNarrative();

  // Render
  render();
}

function simStep(){simPause();simulateDay()}
function simPlay(){
  if(S.running)return;
  S.running=true;
  S.timer=setInterval(simulateDay,S.speed);
  document.getElementById('play-btn').textContent='Pause ⏸';
  document.getElementById('sim-status').textContent='Running';
}
function simPause(){
  S.running=false;
  if(S.timer)clearInterval(S.timer);
  S.timer=null;
  document.getElementById('play-btn').textContent='Play ▶';
  document.getElementById('sim-status').textContent='Paused';
}
function simToggle(){S.running?simPause():simPlay()}
function setSpeed(ms,btn){
  S.speed=ms;
  const wasRunning=S.running;
  simPause();
  document.querySelectorAll('#controls button[data-speed]').forEach(b=>b.classList.remove('active-speed'));
  btn.classList.add('active-speed');
  if(wasRunning)simPlay();
}

function injectScenario(type){
  const cspId=document.getElementById('inj-target').value;
  const zoneId=document.getElementById('inj-zone-target').value;
  const csp=S.partners.find(p=>p.id===cspId);

  switch(type){
    case'reject':{
      if(!csp){alert('Select a target CSP');return}
      S.injections.push({type:'reject',cspId:csp.id,endDay:S.day+21});
      emit('INJECTION','injection',csp.id,
        `INJECTED: ${csp.name} will reject all connections for 21 days`,
        ['Manual injection: CSP refuses all incoming requests',
         'Expected: utilization drops → exposure band drops → fewer offers',
         'System self-corrects without manual intervention']
      );
      break;
    }
    case'disintermediation':{
      if(!csp){alert('Select a target CSP');return}
      enforcementFPVTrack(csp,'DISINTERMEDIATION','SERIOUS');
      emit('INJECTION','injection',csp.id,
        `INJECTED: Disintermediation detected for ${csp.name}`,
        ['Manual injection: CSP bypassing Wiom to serve customers directly',
         'FPV track activated immediately (P15 bypassed)',
         'Financial hold applied, investigation started']
      );
      break;
    }
    case'fraud':{
      if(!csp){alert('Select a target CSP');return}
      enforcementFPVTrack(csp,'FRAUD','CRITICAL');
      emit('INJECTION','injection',csp.id,
        `INJECTED: Fraud detected for ${csp.name}`,
        ['Manual injection: Billing manipulation / fake installations',
         'Severity: CRITICAL → immediate suspension path',
         'FPV track: CRITICAL severity leads to termination']
      );
      break;
    }
    case'power_outage':{
      if(!zoneId){alert('Select a target zone');return}
      const zone=ZONES.find(z=>z.id===zoneId);
      // Reduce uptime for all CSPs in zone
      S.partners.filter(p=>p.zoneId===zoneId).forEach(p=>{
        p.baseUptime=Math.max(50,p.baseUptime-15);
      });
      S.injections.push({type:'power_outage',zoneId,endDay:S.day+7,originalUptimes:{}});
      emit('INJECTION','injection',null,
        `INJECTED: Power outage in ${zone.name} for 7 days`,
        ['All CSPs in zone: uptime reduced by ~15%',
         'Expected: multiple CSPs hit AT_RISK/NON_COMPLIANT simultaneously',
         'Tests zone-wide stress scenario']
      );
      break;
    }
    case'demand_spike':{
      if(!zoneId){alert('Select a target zone');return}
      const zone2=ZONES.find(z=>z.id===zoneId);
      S.injections.push({type:'demand_spike',zoneId,endDay:S.day+14,extraDemand:8});
      emit('INJECTION','injection',null,
        `INJECTED: Demand spike in ${zone2.name} (+8/day for 14 days)`,
        ['Connection requests surge in zone',
         'Tests capacity limits and routing under pressure',
         'Expect some requests to expire if capacity insufficient']
      );
      break;
    }
    case'csp_improves':{
      if(!csp){alert('Select a target CSP');return}
      csp.baseUptime=Math.min(98,csp.baseUptime+8);
      csp.baseResolution=Math.max(2,csp.baseResolution-2);
      emit('INJECTION','injection',csp.id,
        `INJECTED: ${csp.name} improves (bought battery backup + training)`,
        ['Base uptime improved by +8%','Resolution time improved by -2h',
         'Expected: quality improves over next few evaluation windows',
         'If currently restricted, should auto-clear on reaching COMPLIANT']
      );
      break;
    }
  }
  renderInjectionLog();
}

  else if(p.quality.composite==='NON_COMPLIANT')qClass='q-non-compliant';
  else if(p.quality.composite==='RECOVERY')qClass='q-recovery';

  let eClass='';
  if(p.enforcement.perfState==='RESTRICTED')eClass='e-restricted';
  else if(p.enforcement.perfState==='PRE_EXIT')eClass='e-pre-exit';
  if(p.enforcement.fpvState==='SUSPENDED')eClass='e-suspended';
  if(p.enforcement.fpvState==='TERMINATED')eClass='e-terminated';

  const label=p.id.replace('CSP-','');
  return`<div class="csp-dot ${qClass} ${eClass}" data-id="${p.id}"
    onmouseenter="showTooltip(event,'${p.id}')" onmouseleave="hideTooltip()"
    onclick="selectPartner('${p.id}')"
    title="${p.name}">${label}</div>`;
}

    'FPV_FLAGGED':`${name} flagged for investigation — integrity violation detected.`,
    'FPV_SUSPENDED':`${name} suspended — all routing stopped pending investigation.`,
    'FPV_TERMINATED':`${name} terminated — partnership ended permanently.`,
    'CONN_ACCEPTED':`New customer assigned to ${name} and accepted.`,
    'CONN_EXPIRED':`Customer request expired — no partner available in zone.`,
    'CONN_DECLINED_EXPIRED':`${name} declined, no alternative found — request expired.`,
    'CONN_LIFECYCLE':`${name}: ${ev.desc.split(': ').slice(1).join(': ')||'lifecycle update'}.`,
    'CONN_INSTALL_FAILED':`Customer install at ${name} failed permanently.`,
    'EXPOSURE_CHANGE':`${name}'s routing access changed — ${ev.desc.includes('INELIGIBLE')?'now blocked from new customers':'exposure level adjusted'}.`,
    'COMP_PAYOUT':`${name} earned ₹${ev.payload?.amount||''} from customer recharges.`,
    'COMP_BONUS_CHANGE':`${name}'s bonus tier changed — ${ev.desc.split('→').pop()?.trim()||'updated'}.`,
    'PARAM_CHANGE':`System parameter updated: ${ev.desc}`,
    'PARAM_RESET':`All parameters reset to defaults.`,
  };
  return map[ev.type]||ev.desc;
}

function renderEventLog(){
  const el=document.getElementById('event-list');
  const toggle=document.getElementById('ev-mode-toggle');
  if(toggle)toggle.textContent=S.evPlainMode?'Technical':'Plain English';
  let evs=S.events.slice().reverse();
  // Filter to focusZone partners if zone focus is active
  if(S.focusZone){
    const zonePartnerIds=new Set(S.partners.filter(p=>p.zoneId===S.focusZone).map(p=>p.id));
    evs=evs.filter(e=>!e.partnerId||zonePartnerIds.has(e.partnerId));
  }
  if(S.evFilter!=='all')evs=evs.filter(e=>e.category===S.evFilter);
  evs=evs.slice(0,200);

  el.innerHTML=evs.map(ev=>{
    const whyHtml=ev.why.length?`<div class="event-why" id="why-${ev.id}">${ev.why.map(w=>'→ '+w).join('<br>')}</div>`:'';
    const os=osLabel(ev.category);
    if(S.evPlainMode){
      return`<div class="event-item ev-plain" onclick="toggleWhy(${ev.id})">
        <span class="ev-time">D${ev.day}</span>
        <span class="ev-os-badge ${os.cls}">${os.name}</span>
        <span>${evToPlain(ev)}</span>
        ${whyHtml}
      </div>`;
    }
    return`<div class="event-item" onclick="toggleWhy(${ev.id})">
      <span class="ev-time">D${ev.day}</span>
      <span class="ev-os-badge ${os.cls}">${os.name}</span>
      <span class="ev-type ${ev.category}">${ev.type}</span>
      <span>${ev.desc}</span>
      ${whyHtml}
    </div>`;
  }).join('');
}

function toggleEvMode(){S.evPlainMode=!S.evPlainMode;renderEventLog()}

function toggleWhy(id){
  const el=document.getElementById('why-'+id);
  if(el)el.classList.toggle('show');
}

      </div>

        <div class="impact-big" style="color:${fulfillRate>=90?'#059669':fulfillRate>=70?'#d97706':'#dc2626'}">${fulfillRate.toFixed(0)}%</div>
        <div class="impact-sub">of customer requests fulfilled today</div>

function updateParam(key,value,input){
  const num=parseFloat(value);
  if(isNaN(num))return;
  const old=SPR[key];
  SPR[key]=num;
  input.classList.add('param-changed');
  emit('PARAM_CHANGE','injection',null,
    `Parameter ${key}: ${old} → ${num}`,
    [`Forward-effective from Day ${S.day}`,`Rule: SPR v1.1, parameter governance`]
  );
}

function resetParams(){
  SPR={...SPR_DEFAULTS};
  renderParamsView();
  emit('PARAM_RESET','injection',null,'All parameters reset to defaults',['SPR reset']);
}

// SECTION 23: NARRATIVE ENGINE
// ============================================================
function generateNarrative(){
  const dayEvs=S.events.filter(e=>e.day===S.day);
  const isEvalDay=S.day%SPR.P01===0;
  if(dayEvs.length===0){
    S.narrative=isEvalDay?'Evaluation day, but no quality state changes — all partners held steady.':'Routine day — only connection lifecycle and routing running. No state changes.';
    addTimeline([{os:'lifecycle',text:'Quiet day — no state changes.'}]);return;
  }

  const parts=[];
  const tlEntries=[];
  // Lead with eval day context
  if(isEvalDay){
    parts.push(`<span class="nar-os os-quality">Quality OS</span> <b>evaluation day</b> (Window ${S.qualityWindow}) — all partners evaluated simultaneously.`);
  }

  // Count quality changes
  const qEvs=dayEvs.filter(e=>e.category==='quality');
  if(qEvs.length>0){
    const toNC=qEvs.filter(e=>e.desc.includes('NON_COMPLIANT')).length;
    const toAR=qEvs.filter(e=>e.desc.includes('AT_RISK')).length;
    const toComp=qEvs.filter(e=>e.desc.includes('COMPLIANT')&&!e.desc.includes('NON_')).length;
    const toRecov=qEvs.filter(e=>e.desc.includes('RECOVERY')).length;
    const qParts=[];
    if(toNC>0)qParts.push(`${toNC} partners fell to Non-Compliant`);
    if(toAR>0)qParts.push(`${toAR} moved to At Risk`);
    if(toComp>0)qParts.push(`${toComp} achieved Compliant`);
    if(toRecov>0)qParts.push(`${toRecov} entered Recovery`);
    if(qParts.length>0){
      const txt=`<span class="nar-os os-quality">Quality OS</span> evaluated all partners (Window ${S.qualityWindow}): ${qParts.join(', ')}.`;
      parts.push(txt);
      tlEntries.push({os:'quality',text:`Quality evaluation Window ${S.qualityWindow}: ${qParts.join(', ')}.`});
    }
  }

  // Enforcement changes
  const eEvs=dayEvs.filter(e=>e.category==='enforcement');
  if(eEvs.length>0){
    const restricted=eEvs.filter(e=>e.desc.includes('RESTRICTED')).length;
    const preExit=eEvs.filter(e=>e.desc.includes('PRE_EXIT')).length;
    const cleared=eEvs.filter(e=>e.desc.includes('CLEAR')&&e.type==='ENF_CLEAR').length;
    const eParts=[];
    if(restricted>0)eParts.push(`${restricted} restricted`);
    if(preExit>0)eParts.push(`${preExit} moved to pre-exit`);
    if(cleared>0)eParts.push(`${cleared} cleared`);
    if(eParts.length>0){
      const txt=`<span class="nar-os os-enforcement">Enforcement OS</span> ${eParts.join(', ')}.`;
      parts.push(txt);
      tlEntries.push({os:'enforcement',text:`Enforcement actions: ${eParts.join(', ')}.`});
    }
  }

  // FPV events (state transitions — flagged, suspended, terminated)
  const fpvEvs=dayEvs.filter(e=>e.category==='fpv');
  fpvEvs.forEach(e=>{
    const txt=`<span class="nar-os os-fpv">FPV Track</span> ${e.desc}`;
    parts.push(txt);
    tlEntries.push({os:'fpv',text:e.desc});
  });

  // FPV ongoing investigation progress (show countdown even on quiet days)
  const fpvActive=S.partners.filter(p=>p.enforcement.fpvState==='FPV_FLAGGED'||p.enforcement.fpvState==='SUSPENDED');
  fpvActive.forEach(p=>{
    const e=p.enforcement;
    const daysFlagged=S.day-e.fpvFlaggedDay;
    // Skip the day of the transition event itself (already shown above)
    const hasFpvEvent=fpvEvs.some(ev=>ev.partnerId===p.id);
    if(hasFpvEvent)return;

    if(e.fpvState==='FPV_FLAGGED'){
      const remaining=SPR.E04-daysFlagged;
      if(remaining>0&&daysFlagged>0){
        const txt=`<span class="nar-os os-fpv">FPV Track</span> <b>${p.name}</b>: Investigation day ${daysFlagged} of ${SPR.E04} — wallet frozen, no new customers routed. <em>${remaining} day${remaining>1?'s':''} until auto-suspension.</em>`;
        parts.push(txt);
        tlEntries.push({os:'fpv',text:`${p.name}: FPV investigation day ${daysFlagged}/${SPR.E04}, ${remaining}d to suspension`});
      }
    } else if(e.fpvState==='SUSPENDED'){
      const suspDays=S.day-e.suspendedDay;
      if(e.fpvSeverity==='CRITICAL'){
        const txt=`<span class="nar-os os-fpv">FPV Track</span> <b>${p.name}</b>: SUSPENDED (CRITICAL severity) — termination imminent tomorrow.`;
        parts.push(txt);
        tlEntries.push({os:'fpv',text:`${p.name}: SUSPENDED CRITICAL, termination imminent`});
      } else {
        const totalRemaining=SPR.E04*2-daysFlagged;
        if(totalRemaining>0&&suspDays>0){
          const txt=`<span class="nar-os os-fpv">FPV Track</span> <b>${p.name}</b>: SUSPENDED — all routing stopped, customer migration underway. <em>${totalRemaining} day${totalRemaining>1?'s':''} until termination.</em>`;
          parts.push(txt);
          tlEntries.push({os:'fpv',text:`${p.name}: SUSPENDED day ${suspDays}, ${totalRemaining}d to termination`});
        }
      }
    }
  });

  // Routing
  const rEvs=dayEvs.filter(e=>e.category==='routing');
  if(rEvs.length>0){
    const assigned=rEvs.filter(e=>e.type==='CONN_ACCEPTED').length;
    const expired=rEvs.filter(e=>e.type==='CONN_EXPIRED'||e.type==='CONN_DECLINED_EXPIRED').length;
    if(assigned>0||expired>0){
      const rParts=[];
      if(assigned>0)rParts.push(`${assigned} new connections routed`);
      if(expired>0)rParts.push(`${expired} requests expired (no capacity)`);
      const txt=`<span class="nar-os os-routing">D&A OS</span> ${rParts.join(', ')}.`;
      parts.push(txt);
      tlEntries.push({os:'routing',text:`Routing: ${rParts.join(', ')}.`});
    }
  }

  // Compensation
  const cEvs=dayEvs.filter(e=>e.category==='compensation');
  if(cEvs.length>0){
    const totalPaid=cEvs.reduce((s,e)=>s+(e.payload?.amount||0),0);
    if(totalPaid>0){
      const txt=`<span class="nar-os os-compensation">Compensation OS</span> ₹${totalPaid.toLocaleString()} paid across ${cEvs.length} partners.`;
      parts.push(txt);
      tlEntries.push({os:'compensation',text:`₹${totalPaid.toLocaleString()} paid to ${cEvs.length} partners.`});
    }
  }

  // Concentration
  const conEvs=dayEvs.filter(e=>e.category==='concentration');
  conEvs.forEach(e=>{
    parts.push(`<span class="nar-os os-concentration">Concentration</span> ${e.desc}`);
    tlEntries.push({os:'concentration',text:e.desc});
  });

  // Injections
  const injEvs=dayEvs.filter(e=>e.category==='injection');
  injEvs.forEach(e=>{
    parts.push(`<span class="nar-os os-injection">Injection</span> ${e.desc}`);
    tlEntries.push({os:'injection',text:e.desc});
  });

  // Build narrative
  if(parts.length===0){
    S.narrative=`<b>Day ${S.day}:</b> Routine operations — connections serviced, no state changes.`;
    addTimeline([{os:'lifecycle',text:'Routine operations, no state changes.'}]);
  } else {
    S.narrative=`<b>Day ${S.day}:</b> `+parts.join(' ');
    addTimeline(tlEntries);
  }
}

function addTimeline(entries){
  // Find or create today's group
  let dayGroup=S.timeline.find(t=>t.day===S.day);
  if(!dayGroup){dayGroup={day:S.day,entries:[]};S.timeline.push(dayGroup)}
  entries.forEach(e=>dayGroup.entries.push(e));
}

       text:`Every morning, the entire system wakes up simultaneously. ${QO} checks whether today is an evaluation day (every \${P01} days). ${DO} starts processing overnight connection requests from customers. ${LO} ages all pending installs, checks expiries, and triggers recharges. ${FO} checks investigation timers for any flagged partners. ${CO} processes any recharges that came in. Nothing waits for anything else — they all run in parallel.`,
       note:'This is the key concept. The system is not a pipeline where step 1 finishes before step 2 starts. Every OS acts simultaneously.'},

function wtParamReplace(text){
  return text.replace(/\$\{P01\}/g,SPR.P01).replace(/\$\{THRESH_SS\}/g,SPR.THRESH_SS)
    .replace(/\$\{THRESH_SR\}/g,SPR.THRESH_SR).replace(/\$\{THRESH_IQ\}/g,SPR.THRESH_IQ)
    .replace(/\$\{P17_SS\}/g,SPR.P17_SS).replace(/\$\{P17_SR\}/g,SPR.P17_SR)
    .replace(/\$\{P17_IQ\}/g,SPR.P17_IQ).replace(/\$\{E01\}/g,SPR.E01)
    .replace(/\$\{E02\}/g,SPR.E02).replace(/\$\{E03\}/g,SPR.E03)
    .replace(/\$\{E04\}/g,SPR.E04).replace(/\$\{P41\}/g,SPR.P41)
    .replace(/\$\{P42\}/g,SPR.P42).replace(/\$\{P44\}/g,SPR.P44)
    .replace(/\$\{P46\}/g,SPR.P46).replace(/\$\{P50\}/g,SPR.P50)
    .replace(/\$\{P53\}/g,SPR.P53).replace(/\$\{P56\}/g,SPR.P56)
    .replace(/\$\{P58\}/g,SPR.P58).replace(/\$\{P74\}/g,SPR.P74)
    .replace(/\$\{P10_RECOVERY\}/g,SPR.P10_RECOVERY)
    .replace(/\$\{RC01\}/g,SPR.RC01);
}

function renderRefWalkthroughs(){
  // Scenario picker buttons
  if(!S.activeWalkthrough)S.activeWalkthrough='day_in_life';
  const pickerHtml=`<div class="wt-picker">${WALKTHROUGH_SCENARIOS.map(sc=>
    `<button class="${sc.id===S.activeWalkthrough?'active':''}" onclick="wtPickScenario('${sc.id}')">${sc.title}</button>`
  ).join('')}</div>`;

  // Render only the active scenario
  const sc=WALKTHROUGH_SCENARIOS.find(s=>s.id===S.activeWalkthrough);
  if(!sc)return pickerHtml;
  if(!S.walkthroughs[sc.id])S.walkthroughs[sc.id]={step:0};
  const step=S.walkthroughs[sc.id].step;
  const scene=sc.scenes[step];
  const total=sc.scenes.length;

  const sceneHtml=`<div class="wt-scene-header">
    <span class="wt-scene-num">${step+1}</span>
    <span class="wt-scene-title">${wtParamReplace(scene.title)}</span>
  </div>
  <div class="wt-narrative">${wtParamReplace(scene.text)}</div>
  ${scene.note?`<div class="wt-note">💡 ${wtParamReplace(scene.note)}</div>`:''}`;

  const insightHtml=step>=total-1?`<div class="wt-key-insight"><b>Key takeaway:</b> ${wtParamReplace(sc.insight)}</div>`:'';

  const controlsHtml=`<div class="wt-controls">
    <button onclick="wtPrev('${sc.id}')" ${step<=0?'disabled':''}>← Previous</button>
    <button class="primary" onclick="wtNext('${sc.id}')" ${step>=total-1?'disabled':''}>${step>=total-1?'Done ✓':'Next →'}</button>
    <span class="wt-step-info">Scene ${step+1} of ${total}</span>
  </div>`;

  return`${pickerHtml}<div class="wt-card">
    <h4>${sc.title}</h4>
    <div class="wt-subtitle">${sc.subtitle}</div>
    ${sceneHtml}
    ${insightHtml}
    ${controlsHtml}
  </div>`;
}

function wtPickScenario(id){
  S.activeWalkthrough=id;
  if(!S.walkthroughs[id])S.walkthroughs[id]={step:0};
  renderReferenceView();
}

function wtNext(id){
  const sc=WALKTHROUGH_SCENARIOS.find(s=>s.id===id);
  if(!sc)return;
  if(!S.walkthroughs[id])S.walkthroughs[id]={step:0};
  if(S.walkthroughs[id].step<sc.scenes.length-1){
    S.walkthroughs[id].step++;
  }
  renderReferenceView();
}

function wtPrev(id){
  if(!S.walkthroughs[id])return;
  if(S.walkthroughs[id].step>0){
    S.walkthroughs[id].step--;
  }
  renderReferenceView();
}

// ============================================================
function init(){
  S.partners=generatePartners();
  S.connections=generateInitialConnections(S.partners);

  // Default to Lucknow (10 partners) for first run — manageable scale
  S.focusZone='Z04';

  // Render injection bar
  renderInjectionBar();

  // Default selected partner to one in focus zone
  const focusPartners=S.partners.filter(p=>p.zoneId===S.focusZone);
  S.selectedPartnerId=focusPartners.length>0?focusPartners[0].id:S.partners[0].id;
  S.selectedZoneId=S.focusZone||ZONES[0].id;

  render();
  console.log('Wiom Simulation initialized:',S.partners.length,'partners,',S.connections.length,'connections');
}

// Start
init();
