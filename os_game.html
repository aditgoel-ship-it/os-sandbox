<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Understanding Wiom OS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
:root{
  --brand:#d92b90;--brand-bg:#fdf2f8;
  --green:#059669;--green-bg:#ecfdf5;--red:#dc2626;--red-bg:#fef2f2;
  --amber:#d97706;--amber-bg:#fffbeb;--blue:#2563eb;--muted:#64748b;
  --bg:#111118;--accent:#d92b90;--glow:rgba(217,43,144,.15);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:#e2e8f0;min-height:100vh;min-height:100dvh;overflow-x:hidden;transition:background .6s ease;}

/* ── Theme per story ── */
body.story-1{--bg:#0c1f1a;--accent:#10b981;--glow:rgba(16,185,129,.12);}
body.story-2{--bg:#1f0c0c;--accent:#ef4444;--glow:rgba(239,68,68,.12);}
body.story-3{--bg:#140c1f;--accent:#8b5cf6;--glow:rgba(139,92,246,.12);}

/* ── Shared ── */
.container{max-width:540px;margin:0 auto;padding:20px 16px;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;}
.btn{display:inline-block;padding:16px 28px;border-radius:14px;font-size:1rem;font-weight:700;border:none;cursor:pointer;transition:all .2s;text-align:center;width:100%;-webkit-tap-highlight-color:transparent;}
.btn:active{transform:scale(.97);}
.btn-brand{background:var(--accent);color:#fff;box-shadow:0 4px 20px var(--glow);}
.btn-outline{background:transparent;color:#fff;border:2px solid rgba(255,255,255,.15);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);}

/* ── Welcome ── */
#welcome{justify-content:center;align-items:center;text-align:center;gap:24px;}
#welcome h1{font-size:2.2rem;font-weight:900;color:var(--brand);letter-spacing:-0.5px;line-height:1.15;}
#welcome .subtitle{color:#94a3b8;font-size:0.95rem;font-weight:500;line-height:1.6;max-width:380px;}
#welcome .stats{display:flex;gap:24px;justify-content:center;margin:4px 0;}
#welcome .stat{text-align:center;padding:12px 16px;background:rgba(255,255,255,.04);border-radius:12px;min-width:80px;}
#welcome .stat-val{font-size:1.5rem;font-weight:900;color:#fff;}
#welcome .stat-label{font-size:0.6rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}

/* ── Progress ── */
.progress-wrap{display:flex;gap:4px;margin-bottom:16px;}
.progress-seg{flex:1;height:4px;border-radius:4px;background:rgba(255,255,255,.08);overflow:hidden;position:relative;}
.progress-seg .fill{height:100%;border-radius:4px;background:var(--accent);transition:width .4s ease;}

/* ── Story Intro ── */
#storyIntro{gap:16px;}
.story-num{display:inline-flex;align-items:center;gap:8px;font-size:0.65rem;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);}
.story-num::before{content:'';display:inline-block;width:24px;height:2px;background:var(--accent);border-radius:2px;}
.story-title{font-size:1.7rem;font-weight:900;color:#fff;line-height:1.2;letter-spacing:-0.3px;}
.story-subtitle{font-size:0.9rem;color:#94a3b8;font-weight:500;line-height:1.5;}
.story-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:20px 18px;margin:4px 0;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);}
.story-card h3{font-size:0.8rem;font-weight:800;color:var(--accent);margin-bottom:10px;text-transform:uppercase;letter-spacing:0.5px;}
.story-card p{font-size:0.88rem;color:#cbd5e1;line-height:1.65;}
.story-card strong{color:#fff;font-weight:700;}
.story-card .highlight{background:var(--glow);border-left:3px solid var(--accent);padding:10px 14px;margin-top:12px;border-radius:0 10px 10px 0;font-size:0.82rem;color:#e2e8f0;line-height:1.55;}

/* ── Question ── */
#question{gap:16px;}
.q-header{display:flex;justify-content:space-between;align-items:center;}
.q-counter{font-size:0.7rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.q-score{font-size:0.7rem;font-weight:800;color:var(--accent);text-transform:uppercase;letter-spacing:1px;}
.q-text{font-size:1.05rem;font-weight:700;color:#fff;line-height:1.5;padding:4px 0;}
.options{display:flex;flex-direction:column;gap:10px;}
.option{background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.08);border-radius:14px;padding:16px 18px;font-size:0.88rem;color:#cbd5e1;line-height:1.45;cursor:pointer;transition:all .2s;text-align:left;font-weight:500;-webkit-tap-highlight-color:transparent;min-height:52px;display:flex;align-items:center;gap:4px;}
.option:active{transform:scale(.98);}
.option:hover{border-color:rgba(255,255,255,.2);background:rgba(255,255,255,.07);}
.option.correct{border-color:var(--green)!important;background:rgba(5,150,105,.12)!important;color:#6ee7b7!important;font-weight:600;}
.option.wrong{border-color:var(--red)!important;background:rgba(239,68,68,.12)!important;color:#fca5a5!important;}
.option.dimmed{opacity:.4;pointer-events:none;}
.option .opt-label{font-weight:800;color:var(--accent);margin-right:4px;flex-shrink:0;}

/* ── Feedback ── */
.feedback{border-radius:14px;padding:16px 18px;animation:slideUp .3s ease;}
.feedback.correct-fb{background:rgba(5,150,105,.08);border:1px solid rgba(5,150,105,.15);}
.feedback.wrong-fb{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.15);}
.fb-title{font-size:0.9rem;font-weight:800;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.feedback.correct-fb .fb-title{color:#6ee7b7;}
.feedback.correct-fb .fb-title::before{content:'\2713';font-size:0.8rem;}
.feedback.wrong-fb .fb-title{color:#fca5a5;}
.feedback.wrong-fb .fb-title::before{content:'\2717';font-size:0.8rem;}
.fb-text{font-size:0.82rem;color:#94a3b8;line-height:1.6;}
.fb-text strong{color:#e2e8f0;}
.fb-os{display:inline-block;padding:3px 10px;border-radius:6px;font-size:0.65rem;font-weight:700;letter-spacing:0.3px;background:var(--glow);color:var(--accent);margin-top:8px;}
@keyframes slideUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

/* ── Story Review ── */
#storyReview{gap:16px;}
.review-score{text-align:center;padding:20px;background:var(--glow);border:1px solid rgba(255,255,255,.06);border-radius:16px;}
.review-score-val{font-size:2.2rem;font-weight:900;color:var(--accent);}
.review-score-label{font-size:0.7rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:4px;}
.review-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:20px 18px;}
.review-title{font-size:1.1rem;font-weight:800;color:#fff;margin-bottom:14px;}
.review-item{display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.review-item:last-child{border-bottom:none;}
.review-icon{width:24px;height:24px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:900;flex-shrink:0;margin-top:1px;background:var(--glow);color:var(--accent);}
.review-text{font-size:0.84rem;color:#94a3b8;line-height:1.55;}

/* ── Final Results ── */
#results{justify-content:center;align-items:center;text-align:center;gap:24px;}
.result-circle{width:150px;height:150px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto;}
.result-circle.great{background:rgba(5,150,105,.1);border:3px solid var(--green);}
.result-circle.okay{background:rgba(217,119,6,.1);border:3px solid var(--amber);}
.result-circle.needs-work{background:rgba(220,38,38,.1);border:3px solid var(--red);}
.result-num{font-size:2.8rem;font-weight:900;line-height:1;}
.result-circle.great .result-num{color:var(--green);}
.result-circle.okay .result-num{color:var(--amber);}
.result-circle.needs-work .result-num{color:var(--red);}
.result-of{font-size:0.75rem;font-weight:700;color:var(--muted);margin-top:4px;}
.result-msg{font-size:1.3rem;font-weight:800;color:#fff;}
.result-breakdown{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.rb-item{text-align:center;padding:14px 18px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:12px;min-width:100px;}
.rb-val{font-size:1.3rem;font-weight:900;}
.rb-label{font-size:0.6rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:4px;}

/* ── Hide all screens ── */
.screen{display:none;}
.screen.active{display:flex;}
</style>
</head>

  <p class="subtitle">3 real partner scenarios. 12 questions.<br>Learn how the system actually works.</p>
  <div class="stats">

<div id="storyIntro" class="container screen"></div>

<div id="results" class="container screen"></div>

function trackAnswer(globalQ, optionLabel, isCorrect) {
  if (!db) return;
  const key = 'q' + globalQ;
  // Prevent double-submit per session
  const submitted = JSON.parse(sessionStorage.getItem('submitted') || '{}');
  if (submitted[key]) return;
  submitted[key] = true;
  sessionStorage.setItem('submitted', JSON.stringify(submitted));

  db.ref('responses/' + key + '/' + optionLabel).transaction(v => (v || 0) + 1);
  db.ref('responses/' + key + '/total').transaction(v => (v || 0) + 1);
  db.ref('meta/total_responses').transaction(v => (v || 0) + 1);
}

function trackSession() {
  if (!db) return;
  db.ref('meta/total_sessions').transaction(v => (v || 0) + 1);
}

        { label: "C", text: "Forced to exit the zone entirely", correct: false }
      ],

      ],

  ],

    title: "Story 3 \u2014 Key Takeaways",
    points: [
      "D&A routes by quality band first, then utilization. Lower load wins when quality is equal.",

];

// ══════════════════════════════════════
// GAME STATE
// ══════════════════════════════════════
let currentStory = 0, currentQ = 0, score = 0, storyScores = [0,0,0], answered = false, totalQ = 12;

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function setTheme(theme) {
  document.body.className = theme || '';
}

// ── Progress bar HTML ──
function progressHTML(globalQ) {
  let html = '<div class="progress-wrap">';
  for (let s = 0; s < 3; s++) {
    const segStart = s * 4;
    const segProgress = Math.min(Math.max(globalQ - segStart, 0), 4);
    html += `<div class="progress-seg"><div class="fill" style="width:${segProgress/4*100}%"></div></div>`;
  }
  return html + '</div>';
}

// ══════════════════════════════════════
// WELCOME -> STORY INTRO
// ══════════════════════════════════════
function startGame() {
  currentStory = 0; currentQ = 0; score = 0; storyScores = [0,0,0]; answered = false;
  trackSession();
  showStoryIntro();
}

function showStoryIntro() {
  const s = STORIES[currentStory];
  setTheme(s.theme);
  document.getElementById('storyIntro').innerHTML = `
    <div class="story-num">Story ${s.id} of 3</div>
    <div class="story-title">${s.title}</div>
    <div class="story-subtitle">${s.subtitle}</div>
    <div class="story-card">
      <h3>${s.setup.heading}</h3>
      <p>${s.setup.text}</p>
      <div class="highlight">${s.setup.highlight}</div>
    </div>
    <div style="flex:1"></div>
    <button class="btn btn-brand" onclick="showQuestion()">Start Questions</button>
  `;
  show('storyIntro');
}

// ══════════════════════════════════════
// QUESTION
// ══════════════════════════════════════
function showQuestion() {
  answered = false;
  const s = STORIES[currentStory], q = s.questions[currentQ];
  const globalQ = currentStory * 4 + currentQ + 1;

  document.getElementById('question').innerHTML = `
    ${progressHTML(globalQ - 1)}
    <div class="q-header">
      <span class="q-counter">Q${globalQ} of ${totalQ}</span>
      <span class="q-score">${score}/${globalQ-1} correct</span>
    </div>
    <div class="q-text">${q.text}</div>
    <div class="options" id="optionsBox">
      ${q.options.map((o, i) => `
        <div class="option" data-idx="${i}" onclick="selectOption(${i})">
          <span class="opt-label">${o.label}.</span>${o.text}
        </div>
      `).join('')}
    </div>
    <div id="feedbackBox"></div>
    <div id="nextBtnBox" style="margin-top:auto;"></div>
  `;
  show('question');
}

function selectOption(idx) {
  if (answered) return;
  answered = true;
  const s = STORIES[currentStory], q = s.questions[currentQ];
  const isCorrect = q.options[idx].correct;
  const globalQ = currentStory * 4 + currentQ + 1;

  if (isCorrect) { score++; storyScores[currentStory]++; }

  // Track to Firebase
  trackAnswer(globalQ, q.options[idx].label, isCorrect);

  // Style options
  document.querySelectorAll('#optionsBox .option').forEach((o, i) => {
    if (q.options[i].correct) o.classList.add('correct');
    else if (i === idx && !isCorrect) o.classList.add('wrong');
    if (i !== idx && !q.options[i].correct) o.classList.add('dimmed');
  });

  // Feedback
  document.getElementById('feedbackBox').innerHTML = `
    <div class="feedback ${isCorrect ? 'correct-fb' : 'wrong-fb'}">
      <div class="fb-title">${isCorrect ? 'Correct!' : 'Not quite.'}</div>
      <div class="fb-text">${isCorrect ? q.feedback.correct : q.feedback.wrong}</div>
      <div class="fb-os">${q.feedback.os}</div>
    </div>
  `;

  // Next button
  const isLastQInStory = currentQ === 3, isLastQ = globalQ === totalQ;
  const nextLabel = isLastQ ? 'See Results' : isLastQInStory ? 'Story Review' : 'Next Question';
  document.getElementById('nextBtnBox').innerHTML = `
    <button class="btn btn-brand" onclick="nextStep()" style="margin-top:8px;">${nextLabel} \u2192</button>
  `;
}

function nextStep() {
  const globalQ = currentStory * 4 + currentQ + 1;
  if (globalQ === totalQ) { showResults(); return; }
  if (currentQ === 3) { showStoryReview(); return; }
  currentQ++;
  showQuestion();
}

// ══════════════════════════════════════
// STORY REVIEW
// ══════════════════════════════════════
function showStoryReview() {
  const s = STORIES[currentStory], sc = storyScores[currentStory];
  document.getElementById('storyReview').innerHTML = `
    <div class="review-score">
      <div class="review-score-val">${sc}/4</div>
      <div class="review-score-label">${s.title}</div>
    </div>
    <div class="review-card">
      <div class="review-title">${s.review.title}</div>
      ${s.review.points.map((p, i) => `
        <div class="review-item">
          <div class="review-icon">${i+1}</div>
          <div class="review-text">${p}</div>
        </div>
      `).join('')}
    </div>
    <div style="flex:1"></div>
    <button class="btn btn-brand" onclick="nextStory()">
      ${currentStory < 2 ? 'Next Story \u2192' : 'See Results'}
    </button>
  `;
  show('storyReview');
}

function nextStory() {
  if (currentStory >= 2) { showResults(); return; }
  currentStory++; currentQ = 0;
  showStoryIntro();
}

// ══════════════════════════════════════
// FINAL RESULTS
// ══════════════════════════════════════
function showResults() {
  setTheme('');
  const pct = Math.round(score / totalQ * 100);
  let grade, msg;
  if (pct >= 80) { grade = 'great'; msg = 'Solid understanding of the OS.'; }
  else if (pct >= 50) { grade = 'okay'; msg = 'Good start \u2014 the cheat sheet will help fill gaps.'; }
  else { grade = 'needs-work'; msg = 'Worth another look \u2014 use the cheat sheet as a guide.'; }

  const colors = [storyScores[0],storyScores[1],storyScores[2]].map(s =>
    s >= 3 ? 'var(--green)' : s >= 2 ? 'var(--amber)' : 'var(--red)');

  document.getElementById('results').innerHTML = `
    <div class="result-circle ${grade}">
      <div class="result-num">${score}</div>
      <div class="result-of">out of ${totalQ}</div>
    </div>
    <div class="result-msg">${msg}</div>
    <div class="result-breakdown">
      <div class="rb-item"><div class="rb-val" style="color:${colors[0]}">${storyScores[0]}/4</div><div class="rb-label">Recovering<br>Partner</div></div>
      <div class="rb-item"><div class="rb-val" style="color:${colors[1]}">${storyScores[1]}/4</div><div class="rb-label">Bad<br>Actor</div></div>
      <div class="rb-item"><div class="rb-val" style="color:${colors[2]}">${storyScores[2]}/4</div><div class="rb-label">Zone<br>Crisis</div></div>
    </div>
    <button class="btn btn-brand" onclick="startGame()">Try Again</button>
    <button class="btn btn-outline" onclick="window.location.href='os_cheatsheet.html'">View Cheat Sheet</button>
  `;
  show('results');
}
</script>
